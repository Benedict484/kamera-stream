<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Linse — Kamera-Übertragung</title>
<style>
  :root{
    --ink:#0d1210; --panel:#141b18; --panel-2:#1b2420;
    --line:rgba(180,255,210,0.14); --glass:#9fe6b8; --glass-dim:#4f7d63;
    --text:#eaf3ec; --text-dim:#8ba394;
    --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, 'Inter', 'Helvetica Neue', Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--ink); color:var(--text); font-family:var(--sans); overflow:hidden;}
  .screen{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px; opacity:0; pointer-events:none; transition:opacity .3s ease;}
  .screen.active{opacity:1; pointer-events:auto;}
  .aperture{width:60px; height:60px; margin-bottom:20px; border-radius:50%; border:1.5px solid var(--glass-dim); display:flex; align-items:center; justify-content:center;}
  .aperture::before{content:''; width:20px; height:20px; border-radius:50%; background:var(--glass); box-shadow:0 0 18px rgba(159,230,184,0.5);}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--glass-dim); margin-bottom:10px;}
  h1{font-size:clamp(26px,7vw,38px); font-weight:600; letter-spacing:-0.02em; margin:0 0 8px; text-align:center;}
  .sub{color:var(--text-dim); font-size:14.5px; text-align:center; max-width:320px; margin:0 0 36px; line-height:1.5;}
  .choice-row{display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px;}
  .choice{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:17px 19px; cursor:pointer; color:var(--text); font-size:15.5px; font-weight:500;}
  .choice:active{transform:scale(0.98);}
  .choice .ic{font-size:21px;}
  .choice .meta{display:flex; flex-direction:column; gap:2px; text-align:left;}
  .choice .meta small{color:var(--text-dim); font-weight:400; font-size:12px;}

  #sender-screen{padding:0;}
  .video-wrap{position:relative; width:100%; height:100%; background:#000;}
  #local-video{width:100%; height:100%; object-fit:cover;}
  .hud-top{position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:calc(16px + env(safe-area-inset-top)) 18px 16px; background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);}
  .status-pill{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--text); background:rgba(20,27,24,0.55); border:1px solid var(--line); backdrop-filter:blur(8px); padding:7px 12px; border-radius:100px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--glass-dim); flex-shrink:0;}
  .dot.live{background:#5bf49a; box-shadow:0 0 8px #5bf49a; animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.4;}}
  .hud-bottom{position:absolute; bottom:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:12px; padding:16px 18px calc(22px + env(safe-area-inset-bottom)); background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);}
  .code-card{background:rgba(20,27,24,0.7); border:1px solid var(--line); backdrop-filter:blur(10px); border-radius:14px; padding:12px 18px; text-align:center;}
  .code-card .lbl{font-family:var(--mono); font-size:10px; letter-spacing:.16em; color:var(--text-dim); text-transform:uppercase;}
  .code-card .code{font-family:var(--mono); font-size:30px; letter-spacing:.14em; color:var(--glass); font-weight:600; margin-top:2px;}
  .back-btn{position:absolute; top:calc(18px + env(safe-area-inset-top)); left:18px; background:none; border:none; color:var(--text-dim); font-family:var(--mono); font-size:12px; cursor:pointer;}
  .back-btn.inline{position:static;}

  #receiver-screen{padding:0;}
  .connect-panel{display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; max-width:320px; padding:28px;}
  .code-input{width:100%; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:17px; text-align:center; font-family:var(--mono); font-size:25px; letter-spacing:.3em; color:var(--text); text-transform:uppercase; outline:none;}
  .code-input:focus{border-color:var(--glass-dim);}
  .primary-btn{width:100%; background:var(--glass); color:#0d1210; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600; cursor:pointer;}
  .primary-btn:disabled{opacity:.5;}
  #remote-canvas-wrap{width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center;}
  #remote-img{max-width:100%; max-height:100%;}
  .receiver-hud{position:absolute; top:0; left:0; right:0; padding:calc(16px + env(safe-area-inset-top)) 18px 16px; background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent); display:flex; justify-content:space-between; align-items:center;}
  .msg{font-family:var(--mono); font-size:12px; color:var(--text-dim); text-align:center; min-height:18px;}
  .msg.err{color:#f4795b;}
  .hidden{display:none !important;}
</style>
</head>
<body>

  <div id="start-screen" class="screen active">
    <div class="aperture"></div>
    <div class="eyebrow">Server-Relay · funktioniert unabhängig vom Router</div>
    <h1>Linse</h1>
    <p class="sub">Verbinde dein iPhone direkt mit deinem PC und sieh die Kamera live im Browser.</p>
    <div class="choice-row">
      <button class="choice" id="btn-sender">
        <span class="ic">📱</span>
        <span class="meta">Handy — Sender<small>Kamera freigeben und Code erzeugen</small></span>
      </button>
      <button class="choice" id="btn-receiver">
        <span class="ic">🖥️</span>
        <span class="meta">PC — Empfänger<small>Code eingeben und Bild ansehen</small></span>
      </button>
    </div>
  </div>

  <div id="sender-screen" class="screen">
    <div class="video-wrap">
      <video id="local-video" autoplay playsinline muted></video>
      <canvas id="capture-canvas" class="hidden"></canvas>
      <div class="hud-top">
        <button class="back-btn inline" id="sender-back">← Zurück</button>
        <div class="status-pill"><span class="dot" id="sender-dot"></span><span id="sender-status">Verbindung wird aufgebaut …</span></div>
      </div>
      <div class="hud-bottom">
        <div class="code-card">
          <div class="lbl">Code auf dem PC eingeben</div>
          <div class="code" id="peer-code">– – – –</div>
        </div>
      </div>
    </div>
  </div>

  <div id="receiver-screen" class="screen">
    <button class="back-btn" id="receiver-back">← Zurück</button>
    <div class="connect-panel" id="connect-panel">
      <div class="eyebrow">Verbindung herstellen</div>
      <input class="code-input" id="code-input" placeholder="CODE" maxlength="4" autocomplete="off" autocapitalize="characters">
      <button class="primary-btn" id="connect-btn">Verbinden</button>
      <div class="msg" id="receiver-msg"></div>
    </div>
    <div id="remote-canvas-wrap" class="hidden" style="position:absolute; inset:0;">
      <img id="remote-img">
      <div class="receiver-hud">
        <div class="status-pill"><span class="dot live"></span><span>Live</span></div>
      </div>
    </div>
  </div>

<script>
(function(){
  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function generateCode(len){ let s=''; for(let i=0;i<len;i++) s+=CHARS[Math.floor(Math.random()*CHARS.length)]; return s; }

  const screens = { start: document.getElementById('start-screen'), sender: document.getElementById('sender-screen'), receiver: document.getElementById('receiver-screen') };
  function show(name){ Object.values(screens).forEach(s=>s.classList.remove('active')); screens[name].classList.add('active'); }

  document.getElementById('btn-sender').onclick = () => { show('sender'); startSender(); };
  document.getElementById('btn-receiver').onclick = () => show('receiver');
  document.getElementById('sender-back').onclick = () => { cleanupSender(); show('start'); };
  document.getElementById('receiver-back').onclick = () => { cleanupReceiver(); show('start'); };

  if(!window.isSecureContext){
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#eaf3ec;background:#0d1210;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;">Diese Seite braucht eine sichere Verbindung (HTTPS). Bitte über die ngrok-https-Adresse öffnen, nicht über die lokale IP direkt.</div>';
    return;
  }

  function wsUrl(){
    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    return proto + location.host;
  }

  // ---------------- SENDER ----------------
  let senderSocket=null, localStream=null, captureTimer=null;

  async function startSender(){
    const statusEl = document.getElementById('sender-status');
    const dotEl = document.getElementById('sender-dot');
    const codeEl = document.getElementById('peer-code');
    const video = document.getElementById('local-video');
    const canvas = document.getElementById('capture-canvas');

    try{
      localStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } } });
      video.srcObject = localStream;
    }catch(e){ statusEl.textContent = 'Kein Kamerazugriff: ' + e.message; return; }

    const code = generateCode(4);
    codeEl.textContent = code.split('').join(' ');
    statusEl.textContent = 'Verbinde mit Server …';

    senderSocket = new WebSocket(wsUrl());
    senderSocket.onopen = () => {
      senderSocket.send(JSON.stringify({ type:'register', role:'sender', room: code }));
    };
    senderSocket.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if(msg.type === 'registered'){ statusEl.textContent = 'Bereit — warte auf PC'; }
      if(msg.type === 'peer-joined'){
        statusEl.textContent = 'PC verbunden ✓'; dotEl.classList.add('live');
        startCaptureLoop(video, canvas);
      }
      if(msg.type === 'peer-left'){
        statusEl.textContent = 'Bereit — warte auf PC'; dotEl.classList.remove('live');
        stopCaptureLoop();
      }
    };
    senderSocket.onerror = () => { statusEl.textContent = 'Verbindung zum Server fehlgeschlagen'; };
    senderSocket.onclose = () => { stopCaptureLoop(); };
  }

  function startCaptureLoop(video, canvas){
    stopCaptureLoop();
    const ctx = canvas.getContext('2d');
    captureTimer = setInterval(() => {
      if(!video.videoWidth) return;
      const targetW = 720;
      const scale = targetW / video.videoWidth;
      canvas.width = targetW;
      canvas.height = video.videoHeight * scale;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const data = canvas.toDataURL('image/jpeg', 0.55);
      if(senderSocket && senderSocket.readyState === WebSocket.OPEN){
        senderSocket.send(JSON.stringify({ type:'frame', data }));
      }
    }, 90); // ~11 Bilder pro Sekunde
  }
  function stopCaptureLoop(){ if(captureTimer){ clearInterval(captureTimer); captureTimer=null; } }

  function cleanupSender(){
    stopCaptureLoop();
    if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
    if(senderSocket){ senderSocket.close(); senderSocket=null; }
    document.getElementById('peer-code').textContent='– – – –';
    document.getElementById('sender-status').textContent='Verbindung wird aufgebaut …';
    document.getElementById('sender-dot').classList.remove('live');
  }

  // ---------------- RECEIVER ----------------
  let receiverSocket=null;
  const codeInput = document.getElementById('code-input');
  const msgEl = document.getElementById('receiver-msg');
  const connectPanel = document.getElementById('connect-panel');
  const videoPanel = document.getElementById('remote-canvas-wrap');
  const connectBtn = document.getElementById('connect-btn');
  const remoteImg = document.getElementById('remote-img');

  codeInput.addEventListener('input', () => { codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g,''); });

  connectBtn.onclick = () => {
    const code = codeInput.value.trim();
    if(code.length < 4){ msgEl.textContent='Bitte den 4-stelligen Code eingeben'; msgEl.classList.add('err'); return; }
    msgEl.classList.remove('err');
    msgEl.textContent = 'Verbinde …';
    connectBtn.disabled = true;

    receiverSocket = new WebSocket(wsUrl());
    receiverSocket.onopen = () => {
      receiverSocket.send(JSON.stringify({ type:'register', role:'receiver', room: code }));
    };
    receiverSocket.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if(msg.type === 'registered'){ msgEl.textContent = 'Warte auf Handy …'; }
      if(msg.type === 'peer-joined'){
        msgEl.textContent = ''; connectPanel.classList.add('hidden'); videoPanel.classList.remove('hidden'); connectBtn.disabled=false;
      }
      if(msg.type === 'peer-left'){
        connectPanel.classList.remove('hidden'); videoPanel.classList.add('hidden');
        msgEl.textContent = 'Handy hat die Verbindung beendet'; connectBtn.disabled=false;
      }
      if(msg.type === 'frame'){ remoteImg.src = msg.data; }
      if(msg.type === 'error'){ msgEl.textContent = msg.message; msgEl.classList.add('err'); connectBtn.disabled=false; }
    };
    receiverSocket.onerror = () => { msgEl.textContent = 'Verbindung zum Server fehlgeschlagen'; msgEl.classList.add('err'); connectBtn.disabled=false; };
  };

  function cleanupReceiver(){
    if(receiverSocket){ receiverSocket.close(); receiverSocket=null; }
    videoPanel.classList.add('hidden'); connectPanel.classList.remove('hidden');
    codeInput.value=''; msgEl.textContent=''; msgEl.classList.remove('err'); connectBtn.disabled=false;
  }
})();
</script>
</body>
</html>
